name: Build NX Client 1.12.2

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 8

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build
        shell: bash
        run: |
          set -o pipefail
          ./gradlew build --no-daemon --stacktrace 2>&1 | tee build-log.txt

      - name: Upload mod jar
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: NX-Client-1.12.2
          path: build/libs/*.jar

      - name: Stage release jar
        if: success() && startsWith(github.ref, 'refs/tags/v')
        run: |
          mkdir -p release-files
          cp "$(ls build/libs/*.jar | grep -v sources | grep -v dev | head -1)" release-files/

      - name: Publish release
        if: success() && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: NX Client ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: release-files/*.jar

      - name: Prepare error report
        if: failure()
        run: |
          tail -n 400 build-log.txt > error.txt 2>/dev/null || echo "Build failed before any log output" > error.txt

      - name: Push error to ci-error branch
        if: failure()
        run: |
          grep -iE "error:|cannot find symbol|incompatible|required:|found:|reason:|location:|What went wrong|Could not|\.java:[0-9]" build-log.txt > compile-errors.txt || cp error.txt compile-errors.txt
          git config user.name "ci"
          git config user.email "ci@nx.local"
          git checkout --orphan ci-error
          git rm -rf --cached . >/dev/null 2>&1 || true
          find . -maxdepth 1 -not -name '.' -not -name '.git' -not -name 'error.txt' -not -name 'compile-errors.txt' -exec rm -rf {} + 2>/dev/null || true
          git add error.txt compile-errors.txt
          git commit -m "CI error $(date -u +%FT%TZ)"
          git push -f origin ci-error

      - name: Upload error report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error
          path: error.txt
